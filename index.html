<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexStore | Official Store</title>
    <style>
        :root {
            --main-bg: #000000;
            --card-bg: #111111;
            --accent: #d4af37; /* اللون الذهبي */
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--main-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent);
            margin: 0;
            text-transform: uppercase;
        }

        .product-card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .product-img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid var(--accent);
        }

        .details {
            padding: 20px;
            text-align: right;
        }

        .price {
            font-size: 1.6rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            line-height: 1.5;
        }

        .description {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .size-selector {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 10px 0 20px 0;
            font-size: 1rem;
        }

        .order-btn {
            display: block;
            background: var(--accent);
            color: black;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .order-btn:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #555;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>FLEX STORE</h1>
        <p style="color: #666; margin-top: 5px; letter-spacing: 1px;">PREMIUM OVERSIZE</p>
    </div>

    <div class="product-card">
        <img src="https://raw.githubusercontent.com/t84b64hhrh-hash/FlexStore/main/image.png" alt="Flex Oversize White" class="product-img">
        
        <div class="details">
            <div class="price">350 EGP</div>
            <h2 class="product-title" id="p-title">تيشرت FLEX الأبيض الأساسي - Oversize</h2>
            <p class="description">خامة قطن 100% ثقيلة تعيش معاك، تصميم مريح وأنيق يناسب ستايلك.</p>
            
            <label style="font-size: 0.85rem; color: var(--accent);">اختر مقاسك:</label>
            <select class="size-selector" id="p-size">
                <option value="M">Medium (M)</option>
                <option value="L">Large (L)</option>
                <option value="XL">X-Large (XL)</option>
                <option value="XXL">XX-Large (XXL)</option>
            </select>

            <a href="#" class="order-btn" onclick="sendOrder()">اطلب الآن عبر واتساب</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 FLEX STORE - MANSOURA
    </div>

    <script>
        function sendOrder() {
            const myNumber = "201080827373"; 
            
            const title = document.getElementById('p-title').innerText;
            const size = document.getElementById('p-size').value;
            
            const message = `أهلاً Flex Store، محتاج أطلب:%0A📌 ${title}%0A📏 المقاس: ${size}%0A💰 السعر: 350 EGP`;
            
            window.location.href = `https://wa.me/${myNumber}?text=${message}`;
        }
    </script>

</body>
</html>
